name: Apply Change Set

on:
  workflow_dispatch:
    inputs:
      change_id:
        description: Change id. The workflow reads changes/<change_id>/change.patch from branch changes/<change_id>.
        required: true
        type: string
      base_branch:
        description: Base branch to apply the change set onto.
        required: true
        type: string
        default: main
      output_branch:
        description: Branch to create or update with the applied change set.
        required: true
        type: string
      create_pr:
        description: Create or update a pull request for the output branch.
        required: true
        type: boolean
        default: true
      run_verify:
        description: Run npm install and npm run verify after applying the change set.
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-change-set:
    runs-on: ubuntu-latest

    if: github.actor == 'ibukani'

    steps:
      - name: Validate inputs
        run: |
          case "${{ inputs.change_id }}" in
            ""|.*|*..*|*//*|*\\*|*~*|*:*)
              echo "Invalid change_id: ${{ inputs.change_id }}" >&2
              exit 1
              ;;
          esac
          case "${{ inputs.output_branch }}" in
            ""|main|master|.*|*..*|*//*|*\\*|*~*|*:*)
              echo "Invalid output_branch: ${{ inputs.output_branch }}" >&2
              exit 1
              ;;
          esac

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Fetch change set branch
        run: |
          git fetch origin "changes/${{ inputs.change_id }}:refs/remotes/origin/changes/${{ inputs.change_id }}"

      - name: Read change set metadata
        run: |
          if git cat-file -e "origin/changes/${{ inputs.change_id }}:changes/${{ inputs.change_id }}/metadata.json"; then
            git show "origin/changes/${{ inputs.change_id }}:changes/${{ inputs.change_id }}/metadata.json" > /tmp/change-set-metadata.json
            cat /tmp/change-set-metadata.json
          else
            echo "metadata.json is optional and was not found."
          fi

      - name: Read patch
        run: |
          git show "origin/changes/${{ inputs.change_id }}:changes/${{ inputs.change_id }}/change.patch" > /tmp/change.patch
          test -s /tmp/change.patch

      - name: Create output branch
        run: |
          git checkout -B "${{ inputs.output_branch }}"

      - name: Check patch
        run: |
          git apply --check /tmp/change.patch

      - name: Apply patch
        run: |
          git apply /tmp/change.patch

      - name: Setup Node.js
        if: ${{ inputs.run_verify }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: ${{ inputs.run_verify }}
        run: npm install

      - name: Verify
        if: ${{ inputs.run_verify }}
        run: npm run verify

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "apply change set: ${{ inputs.change_id }}"
          git push --force-with-lease origin "${{ inputs.output_branch }}"

      - name: Create or update pull request
        if: ${{ inputs.create_pr }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ inputs.base_branch }}" \
            --head "${{ inputs.output_branch }}" \
            --title "Apply change set: ${{ inputs.change_id }}" \
            --body "Applied change set \`${{ inputs.change_id }}\` and ran the configured verification." \
          || gh pr edit "${{ inputs.output_branch }}" \
            --title "Apply change set: ${{ inputs.change_id }}" \
            --body "Applied change set \`${{ inputs.change_id }}\` and ran the configured verification."
