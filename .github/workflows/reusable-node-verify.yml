name: Reusable Node Verify

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used for verification.
        required: false
        type: string
        default: "22"
      install-command:
        description: Dependency installation command.
        required: false
        type: string
        default: npm install
      verify-command:
        description: Verification command.
        required: false
        type: string
        default: npm run verify

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Verify
        run: ${{ inputs.verify-command }}
