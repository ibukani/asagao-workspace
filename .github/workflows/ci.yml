name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/reusable-node-verify.yml
    with:
      node-version: "22"
      install-command: "npm install"
      verify-command: "npm run verify"
